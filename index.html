<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>프롬프트 복사</title>
  <style>
    body {
      font-family: Pretendard, Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
      text-align: center;
    }

    .card {
      background: white;
      max-width: 700px;
      margin: auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    pre {
      background: #f1f3f5;
      padding: 20px;
      border-radius: 12px;
      text-align: left;
      white-space: pre-wrap;
      font-size: 15px;
    }

    button {
      margin-top: 20px;
      padding: 16px 24px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #ff7a00;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff5500;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📌 광고포스터 프롬프트</h1>

    <pre id="prompt">
우리는 초등학생이고 1페이지 광고포스터 실습을 하고 있어
상품의 특징은
1.
2.
3.
특징에 맞는 재미있는 상품 이름이랑 판매원 닉네임 10개를 추천해줘
    </pre>

    <button onclick="copyPrompt()">👉 프롬프트 복사하기</button>
    <div id="msg"></div>
  </div>

  <script>
    async function copyPrompt() {
      const text = document.getElementById("prompt").innerText;
      const msg = document.getElementById("msg");

      try {
        await navigator.clipboard.writeText(text);
        msg.innerText = "복사 완료! ChatGPT에 붙여넣기 하세요 👍";
      } catch (err) {
        msg.innerText = "자동 복사 실패 😢 텍스트를 길게 눌러 복사해주세요.";
      }
    }
  </script>
</body>
</html>
